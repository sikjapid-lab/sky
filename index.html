<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه ردیابی زنده پروازها | WebGIS</title>
    
    <!-- CDN خودکار کتابخانه‌های CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="sidebar">
        <h2><i class="fa-solid fa-plane-departure"></i> ردیاب پرواز OpenSky</h2>
        <p>نمایش زنده موقعیت مکانی هواپیماها در حریم هوایی</p>
        <hr>
        <div class="stats-box">
            <span>تعداد پروازهای فعال:</span>
            <strong id="flight-count">0</strong>
        </div>
        <div class="info-box">
            <p><small>* داده‌ها هر ۱۰ ثانیه به روزرسانی می‌شوند.</small></p>
        </div>
    </div>

    <div id="map"></div>

    <!-- CDN خودکار کتابخانه‌های JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
