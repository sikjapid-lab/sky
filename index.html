<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه پایش هوایی و شبیه‌سازی ۳D</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- CesiumJS CSS -->
    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0b0f19; color: #fff; }

        /* نوار افقی بالای نقشه */
        #top-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 55px;
            z-index: 2000;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .brand-title { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 0.95rem; color: #38bdf8; }
        .controls-group { display: flex; align-items: center; gap: 8px; }

        .input-box {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.82rem;
            outline: none;
        }

        .btn-action {
            background: #0284c7;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.82rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .btn-action:hover { background: #0369a1; }
        .btn-mode { background: #334155; }
        .btn-mode.active { background: #0284c7; }

        .stat-badge { font-size: 0.8rem; color: #94a3b8; }
        .stat-badge span { color: #4ade80; font-weight: bold; }

        /* کانتینر اصلی دو پنله (Split View) */
        #map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
        }

        #cesiumContainer {
            width: 50%;
            height: 100%;
            position: relative;
            border-right: 2px solid rgba(255, 255, 255, 0.1);
        }

        #map {
            width: 50%;
            height: 100%;
            position: relative;
        }

        /* حالت‌های نمایش */
        .view-only-3d #cesiumContainer { width: 100%; }
        .view-only-3d #map { display: none; }

        .view-only-2d #map { width: 100%; }
        .view-only-2d #cesiumContainer { display: none; }

        /* جدول کشویی پروازها */
        #table-container {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            height: 220px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            z-index: 2000;
            overflow-y: auto;
            transition: all 0.3s ease-in-out;
        }
        #table-container.table-hidden {
            transform: translateY(120%);
            opacity: 0;
            pointer-events: none;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; text-align: center; }
        th { background: rgba(30, 41, 59, 0.9); color: #38bdf8; padding: 8px; position: sticky; top: 0; }
        td { padding: 6px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        tr:hover { background: rgba(56, 189, 248, 0.1); }
    </style>
</head>
<body>

    <!-- نوار تنظیمات افقی -->
    <div id="top-bar">
        <div class="brand-title">
            <i class="fa-solid fa-plane-radar fa-lg"></i>
            <span>مرکز پایش هوایی ADSB</span>
        </div>

        <div class="controls-group">
            <!-- دکمه‌های تغییر حالت نمایش (شبیه عکس دوم) -->
            <button class="btn-action btn-mode active" id="btn-split" onclick="setContainerMode('split')"><i class="fa-solid fa-columns"></i> دوبعدی + سه‌بعدی</button>
            <button class="btn-action btn-mode" id="btn-2d" onclick="setContainerMode('2d')"><i class="fa-solid fa-map"></i> فقط دوبعدی</button>
            <button class="btn-action btn-mode" id="btn-3d" onclick="setContainerMode('3d')"><i class="fa-solid fa-globe"></i> فقط سه‌بعدی</button>

            <input type="text" id="search-input" class="input-box" placeholder="جستجو (Flight, Hex)..." onkeyup="filterFlights()">
            
            <div class="stat-badge">کل: <span id="flight-count">۰</span></div>
            <div class="stat-badge">نمایش: <span id="visible-count">۰</span></div>

            <button class="btn-action" onclick="toggleTable()"><i class="fa-solid fa-table-list"></i> جدول</button>
            <button class="btn-action" onclick="clearTrails()"><i class="fa-solid fa-eraser"></i> پاکسازی</button>
        </div>
    </div>

    <!-- جدول پروازها -->
    <div id="table-container" class="table-hidden">
        <table>
            <thead>
                <tr>
                    <th>Callsign</th>
                    <th>Reg</th>
                    <th>Type</th>
                    <th>Hex</th>
                    <th>ارتفاع (ft)</th>
                    <th>سرعت (km/h)</th>
                    <th>عملیات</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <!-- کانتینر دو پنله نقشه‌ها -->
    <div id="map-container" class="view-split">
        <div id="cesiumContainer"></div>
        <div id="map"></div>
    </div>

    <!-- اسکریپت‌ها -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
