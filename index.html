<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه صنعتی WebGIS ردیابی پروازهای جهانی</title>
    
    <!-- Leaflet & FontAwesome -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- سایدبار کنترل و آمار -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fa-solid fa-plane-radar"></i> مرکز پایش هوایی WebGIS</h2>
            <p>سیستم زنده ردیابی جهانی ترافیک پروازی</p>
        </div>
        <hr>
        
        <!-- باکس جستجو -->
        <div class="search-box">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="search-input" placeholder="جستجو (Callsign، Hex، نوع...)" oninput="filterFlights()">
        </div>

        <!-- تنظیمات رفرش -->
        <div class="setting-item">
            <label for="refresh-rate"><i class="fa-solid fa-clock"></i> بازه بروزرسانی (ثانیه):</label>
            <input type="number" id="refresh-rate" value="5" min="2" max="60" onchange="updateInterval()">
        </div>

        <!-- آمار زنده -->
        <div class="stats-container">
            <div class="stat-card">
                <span>کل پروازها:</span>
                <strong id="flight-count">0</strong>
            </div>
            <div class="stat-card">
                <span>پروازهای نمایشی:</span>
                <strong id="visible-count">0</strong>
            </div>
        </div>

        <!-- دکمه‌های کنترلی -->
        <div class="action-buttons">
            <button onclick="toggleTable()"><i class="fa-solid fa-table"></i> جدول پروازها</button>
            <button onclick="clearTrails()"><i class="fa-solid fa-route"></i> پاکسازی مسیرها</button>
        </div>
    </div>

    <!-- جدول مشخصات کل پروازها (کشویی از پایین) -->
    <div id="table-container" class="table-hidden">
        <div class="table-header">
            <h3><i class="fa-solid fa-list"></i> لیست کل پروازهای در دید</h3>
            <button onclick="toggleTable()" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="table-wrapper">
            <table id="flights-table">
                <thead>
                    <tr>
                        <th>کد پرواز (Callsign)</th>
                        <th>نوع تایپ</th>
                        <th>Hex ID</th>
                        <th>ارتفاع (متر)</th>
                        <th>سرعت (km/h)</th>
                        <th>Squawk</th>
                        <th>عملیات</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- ردیف‌ها به صورت داینامیک ساخته می‌شوند -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- نقشه -->
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
