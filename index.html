<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه پیشرفته پایش ترافیک هوایی WebGIS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- سایدبار اصلی -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fa-solid fa-radar"></i> مرکز پایش هوایی ADSB</h2>
            <p>نمایش زنده ترافیک پروازی جهانی</p>
        </div>
        <hr>
        
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="جستجو (Callsign، Reg، Hex)..." oninput="filterFlights()">
        </div>

        <div class="setting-item">
            <label for="refresh-rate"><i class="fa-solid fa-rotate"></i> بروزرسانی (ثانیه):</label>
            <input type="number" id="refresh-rate" value="5" min="2" max="60" onchange="updateInterval()">
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <span>کل پروازها:</span>
                <strong id="flight-count">0</strong>
            </div>
            <div class="stat-card">
                <span>نمایشی:</span>
                <strong id="visible-count">0</strong>
            </div>
        </div>

        <div class="action-buttons">
            <button onclick="toggleTable()"><i class="fa-solid fa-table-cells"></i> جدول پروازها</button>
            <button onclick="clearTrails()"><i class="fa-solid fa-route"></i> پاکسازی مسیر</button>
        </div>
    </div>

    <!-- راهنمای رنگ ارتفاع (Altitude Legend) مشابه ADSBExchange -->
    <div id="altitude-legend">
        <span>زمین</span>
        <div class="legend-bar"></div>
        <span>۴۵,۰۰۰+ ft</span>
    </div>

    <!-- جدول کشویی پایین -->
    <div id="table-container" class="table-hidden">
        <div class="table-header">
            <h3><i class="fa-solid fa-list-check"></i> لیست کلیه پروازهای فعال</h3>
            <button onclick="toggleTable()" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="table-wrapper">
            <table id="flights-table">
                <thead>
                    <tr>
                        <th>Callsign</th>
                        <th>Reg</th>
                        <th>تایپ</th>
                        <th>Hex ID</th>
                        <th>ارتفاع (ft)</th>
                        <th>سرعت (km/h)</th>
                        <th>Squawk</th>
                        <th>عملیات</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- نقشه اصلی -->
    <div id="map"></div>

    <!-- نوار وضعیت پایینی (مختصات و ویژگی‌های زنده) -->
    <div id="status-bar">
        <div id="mouse-position"><i class="fa-solid fa-location-crosshairs"></i> مختصات: -- , --</div>
        <div id="map-zoom"><i class="fa-solid fa-magnifying-glass-plus"></i> زوم: --</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
