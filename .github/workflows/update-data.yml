name: Auto Update Flight Data

on:
  schedule:
    # اجرای خودکار در فواصل زمانی منظم (کرون‌جاب)
    - cron: '*/5 * * * *'
  workflow_dispatch: # امکان اجرای دستی از تب Actions

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Flight Data
        run: python fetch_data.py

      - name: Commit and Push Updated Data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/flights.json
          git commit -m "Auto-update live flight data" || exit 0
          git push
